name: Build MHEventsList

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet build MHEventsList.csproj --configuration Release

      - name: Package mod
        run: |
          mkdir -p output/MHEventsList
          cp bin/Release/net9.0/MHEventsList.dll output/MHEventsList/
          cp manifest.json output/MHEventsList/
          cd output && zip -r MHEventsList.zip MHEventsList/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MHEventsList
          path: output/MHEventsList.zip
          
