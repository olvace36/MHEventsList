name: Build MHEventsListFix

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet build MHEventsListFix.csproj --configuration Release

      - name: Package mod
        run: |
          mkdir -p output/MHEventsListFix
          cp bin/Release/net9.0/MHEventsListFix.dll output/MHEventsListFix/
          cp manifest.json output/MHEventsListFix/
          cd output && zip -r MHEventsListFix.zip MHEventsListFix/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MHEventsListFix
          path: output/MHEventsListFix.zip

